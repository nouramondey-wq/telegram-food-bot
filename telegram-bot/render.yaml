# ============================================================================
# Render Blueprint: Telegram Restaurant Bot + API Server
# ============================================================================
# Deploy: Connect this repo to Render, it auto-detects render.yaml
# Manual: https://dashboard.render.com/select-repo?type=blueprint
# ============================================================================

services:
  # ── Main Web Service: Bot + API ──
  - type: web
    name: restaurant-bot
    runtime: node
    repo: https://github.com/your-username/your-repo-name  # ← UPDATE THIS
    branch: main
    plan: free  # or: starter ($7/mo) for better performance

    # ── Build Configuration ──
    buildCommand: |
      cd telegram-bot && npm install && npm run build

    startCommand: cd telegram-bot && npm start

    # ── Health Checks ──
    healthCheckPath: /health
    healthCheckTimeout: 30

    # ── Environment Variables (secrets in Render Dashboard) ──
    envVars:
      # ── Bot Config ──
      - key: BOT_TOKEN
        sync: false  # Secret — enter in Render Dashboard
      - key: BOT_USERNAME
        value: "@NourNasserfoodBot"
      - key: BOT_MODE
        value: webhook  # Production: webhook mode
      - key: WEBHOOK_SECRET
        sync: false    # Secret — generate a random string

      # ── Firebase Admin ──
      - key: FIREBASE_PROJECT_ID
        value: my-restaurant-app-de879
      - key: FIREBASE_PRIVATE_KEY
        sync: false   # Secret — paste your private key (with \n)
      - key: FIREBASE_CLIENT_EMAIL
        sync: false   # Secret — paste your client email

      # ── Mini App ──
      - key: MINI_APP_URL
        value: https://my-restaurant-app-de879.web.app

      # ── Restaurant Info ──
      - key: RESTAURANT_NAME
        value: مطعم ناصر
      - key: RESTAURANT_PHONE
        sync: false
      - key: RESTAURANT_ADDRESS
        sync: false
      - key: RESTAURANT_HOURS
        value: "Sat-Thu: 8:00 AM - 11:00 PM\nFri: Closed"

      # ── Admin ──
      - key: ADMIN_CHAT_IDS
        sync: false

      # ── Security ──
      - key: RATE_LIMIT_MAX
        value: "5"
      - key: RATE_LIMIT_BLOCK
        value: "30"

    # ── Render Auto-Provides ──
    # PORT        → Render assigns dynamically
    # RENDER_EXTERNAL_URL → Your service URL (e.g., https://restaurant-bot.onrender.com)
    # No need to set these manually
